<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Car</title>
    <link rel="stylesheet" th:href="@{/css/add-cars.css}">

</head>

<body>

<div class="container">

    <h1>Add Car</h1>

    <form action="/cars/add" method="post">

        <label>Brand</label>
        <input type="text" name="brand" required>

        <label>Model</label>
        <input type="text" name="model" required>

        <label>Year</label>
        <input type="number" name="year" min="1900" max="2026" required>

        <label>Fuel Type</label>
        <select name="fuelType" id="fuelType" required>
            <option value="" disabled selected>Select a fuel type</option>
            <option value="Gas">Gas</option>
            <option value="Hybrid">Hybrid</option>
            <option value="Electric">Electric</option>
        </select>

        <label>Power (kW)</label>
        <input type="number" name="power" required>

        <label>Consumption</label>
        <input type="number" step="0.1" name="consumption">

        <label>Price</label>
        <input type="number" name="price" required>

        <button type="submit">Add Car</button>

    </form>

    <a href="/cars" class="back-link">← Back</a>

</div>

</body>
</html>

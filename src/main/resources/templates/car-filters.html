<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Car Filters</title>
    <link rel="stylesheet" th:href="@{/css/car-filters.css}">
</head>

<body>
    <script th:src="@{/js/script.js}"></script>

<div class="container">
    <h1>Car Filters</h1>

    <form action="/cars/brand" method="get">
        <label for="brand">Brand:</label>
        <input type="text" id="brand" name="brand" placeholder="Enter brand">
        <button type="submit">Filter</button>
    </form>

    <form action="/cars/year" method="get">
        <label>Production Year:</label>
        <div class="inline-fields">
            <input type="number" id="startingYear" name="startingYear" min="1900" max="2026" placeholder="From">
            <input type="number" id="endingYear" name="endingYear" min="1900" max="2026" placeholder="To">
        </div>
        <button type="submit">Filter</button>
    </form>

    <form action="/cars/consumption" method="get">
        <label for="fuelType">Fuel Type:</label>
        <select id="fuelType" name="fuelType" onchange="changeConsumption()">
            <option value="" selected disabled>Select fuel type</option>
            <option value="All">Show All</option>
            <option value="Gas">Gas</option>
            <option value="Diesel">Diesel</option>
            <option value="Hybrid">Hybrid</option>
            <option value="Electric">Electric</option>
        </select>

        <div id="fuels" class="inline-fields">
            <input type="number" id="lowestConsumption" name="lowestConsumption" step="0.1" placeholder="Min consumption">
            <input type="number" id="highestConsumption" name="highestConsumption" step="0.1" placeholder="Max consumption">
        </div>

        <button type="submit" id="button" style="display:none">Filter</button>
    </form>

    <a href="/cars/add" class="add-button">Add Car</a>
</div>

</body>
</html>
